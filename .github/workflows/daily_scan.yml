name: Daily NSE Trend Scan

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git fetch origin
          git checkout main
          git pull --rebase origin main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Momentum Alpha scan
        env:
          NSE_CSV_PATH: ${{ github.workspace }}/data/NSE_Stocks.csv
        run: python run.py

      - name: Ensure .nojekyll exists
        run: touch docs/.nojekyll

      - name: Show generated files
        run: |
          echo "==== Generated folders ===="
          ls -la docs
          echo "==== Latest dated folder ===="
          ls -la docs/$(date +%Y-%m-%d) || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/ data/

          if git diff --cached --quiet; then
            echo "No documentation changes."
            exit 0
          fi

          git status

          git commit -m "chore: scan results $(date -u +'%Y-%m-%d')"

          git push origin HEAD:main

  deploy:
    needs: scan

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
