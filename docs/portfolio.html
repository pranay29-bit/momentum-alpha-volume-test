<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portfolio Risk Tracker</title>

<link rel="stylesheet" href="css/portfolio.css">

<script type="module" src="js/portfolio.js"></script>
</head>

<body>

<header>
    <h1>Portfolio Risk Tracker</h1>

    <div class="top-buttons">
        <a href="index.html" class="home-btn">
            ← Scanner Dashboard
        </a>

        <button id="loginBtn">
            Login with Google
        </button>
    </div>
</header>

<section class="summary">

<div class="card">
<h3>Initial Risk</h3>
<span id="initialRisk">0%</span>
</div>

<div class="card">
<h3>Open P&L</h3>
<span id="openPnl">0%</span>
</div>

<div class="card">
<h3>Portfolio Heat</h3>
<span id="heat">0%</span>
</div>

<div class="card">
<h3>Average R</h3>
<span id="avgR">0R</span>
</div>

</section>

<section class="settings">

<input id="portfolioSize" type="number" placeholder="Portfolio Size">

<input id="riskPct" type="number" placeholder="Risk Per Trade %">

</section>

<section class="add-position">

<input id="symbol" placeholder="TCS.NS">

<input id="entry" type="number" placeholder="Entry Price">

<input id="stop" type="number" placeholder="Stop Loss">

<button id="addBtn">
Add Position
</button>

</section>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Entry</th>
<th>SL</th>
<th>Qty</th>
<th>Risk/Share</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="positionsTable">
</tbody>

</table>

</body>
</html>
