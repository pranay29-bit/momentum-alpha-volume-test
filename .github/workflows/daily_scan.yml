name: Daily NSE Trend Scan

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Momentum Alpha scan
        env:
          NSE_CSV_PATH: ${{ github.workspace }}/data/NSE_stocks_test.csv
        run: python run.py

      - name: Ensure .nojekyll exists
        run: touch docs/.nojekyll

      - name: Commit & push docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: scan results $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main       # ← pull the freshly committed docs/
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000       # stop waiting after 10 minutes
          error_count: 10       # tolerate up to 10 CDN errors before failing
          reporting_interval: 5000
